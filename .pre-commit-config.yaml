repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: gitnexus-check
        name: gitnexus-code-intelligence
        entry: hooks/gitnexus-check.sh
        language: script
        pass_filenames: false
        always_run: true
